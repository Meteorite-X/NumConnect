<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NumConnect API — Тест dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F2EFEB; color: #1C1917; padding: 24px; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
  .sub { color: #78716C; margin-bottom: 24px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
  .panel { background: #fff; border: 1px solid #E7E5E4; border-radius: 12px; padding: 16px; }
  .member { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #0C8C7F; margin: 14px 0 8px; }
  .member:first-child { margin-top: 0; }
  .ep { display: block; width: 100%; text-align: left; padding: 8px 12px; border-radius: 6px; border: 1px solid #E7E5E4; background: #FAFAF8; cursor: pointer; font-family: ui-monospace, monospace; font-size: 12px; margin-bottom: 4px; transition: 0.15s; }
  .ep:hover { background: #E6F5F3; border-color: #0C8C7F; }
  .ep.on { background: #0C8C7F; color: #fff; border-color: #0C8C7F; }
  .ep .m { display: inline-block; min-width: 38px; font-weight: 700; }
  .url-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .url-bar input { flex: 1; padding: 8px 12px; border: 1px solid #E7E5E4; border-radius: 6px; font-family: ui-monospace, monospace; font-size: 13px; }
  .url-bar button { padding: 8px 18px; background: #0C8C7F; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
  .url-bar button:hover { background: #0A756A; }
  .meta { font-size: 12px; color: #78716C; margin-bottom: 8px; }
  .meta strong { color: #1C1917; }
  pre { background: #FAFAF8; border: 1px solid #E7E5E4; border-radius: 6px; padding: 14px; overflow: auto; max-height: 480px; font-size: 12px; line-height: 1.6; }
  .status-200 { color: #15803D; font-weight: 700; }
  .status-404 { color: #B91C1C; font-weight: 700; }
</style>
</head>
<body>
<h1>NumConnect API Dashboard</h1>
<div class="sub">Endpoint дээр дарж туршина уу. Сервер: <code>http://localhost:3000</code></div>

<div class="grid">
  <div class="panel">
    <div class="member">Гишүүн 1 — Хэрэглэгч / Auth</div>
    <button class="ep" data-method="GET" data-url="/api/users"><span class="m">GET</span> /api/users</button>
    <button class="ep" data-method="GET" data-url="/api/users?online=true"><span class="m">GET</span> /api/users?online=true</button>
    <button class="ep" data-method="GET" data-url="/api/users/nomin"><span class="m">GET</span> /api/users/nomin</button>
    <button class="ep" data-method="GET" data-url="/api/users/enkh/tags"><span class="m">GET</span> /api/users/enkh/tags</button>
    <button class="ep" data-method="GET" data-url="/api/users/nomin/match"><span class="m">GET</span> /api/users/nomin/match</button>
    <button class="ep" data-method="GET" data-url="/api/filters"><span class="m">GET</span> /api/filters</button>
    <button class="ep" data-method="GET" data-url="/api/matches/recent"><span class="m">GET</span> /api/matches/recent</button>
    <button class="ep" data-method="POST" data-url="/api/auth/login" data-body='{"email":"20B1NUM0042@num.edu.mn"}'><span class="m">POST</span> /api/auth/login</button>
    <button class="ep" data-method="POST" data-url="/api/auth/verify" data-body='{"email":"20B1NUM0042@num.edu.mn","code":"427000"}'><span class="m">POST</span> /api/auth/verify</button>

    <div class="member">Гишүүн 2 — Чат</div>
    <button class="ep" data-method="GET" data-url="/api/chat/threads"><span class="m">GET</span> /api/chat/threads</button>
    <button class="ep" data-method="GET" data-url="/api/chat/messages"><span class="m">GET</span> /api/chat/messages</button>
    <button class="ep" data-method="GET" data-url="/api/chat/enkh/messages"><span class="m">GET</span> /api/chat/enkh/messages</button>
    <button class="ep" data-method="POST" data-url="/api/chat/enkh/messages" data-body='{"text":"Сайн уу!"}'><span class="m">POST</span> /api/chat/enkh/messages</button>
    <button class="ep" data-method="GET" data-url="/api/general/messages"><span class="m">GET</span> /api/general/messages</button>
    <button class="ep" data-method="POST" data-url="/api/general/messages" data-body='{"text":"Hi general 👋"}'><span class="m">POST</span> /api/general/messages</button>

    <div class="member">Гишүүн 3 — Landing/Admin/Premium</div>
    <button class="ep" data-method="GET" data-url="/api/stats"><span class="m">GET</span> /api/stats</button>
    <button class="ep" data-method="GET" data-url="/api/features"><span class="m">GET</span> /api/features</button>
    <button class="ep" data-method="GET" data-url="/api/admin/kpis"><span class="m">GET</span> /api/admin/kpis</button>
    <button class="ep" data-method="GET" data-url="/api/admin/reports"><span class="m">GET</span> /api/admin/reports</button>
    <button class="ep" data-method="GET" data-url="/api/admin/reports?status=open"><span class="m">GET</span> /api/admin/reports?status=open</button>
    <button class="ep" data-method="GET" data-url="/api/admin/reports/r1"><span class="m">GET</span> /api/admin/reports/r1</button>
    <button class="ep" data-method="GET" data-url="/api/admin/dau"><span class="m">GET</span> /api/admin/dau</button>
    <button class="ep" data-method="GET" data-url="/api/schedule/template"><span class="m">GET</span> /api/schedule/template</button>
    <button class="ep" data-method="GET" data-url="/api/premium/plans"><span class="m">GET</span> /api/premium/plans</button>
    <button class="ep" data-method="GET" data-url="/api/premium/plans/pro"><span class="m">GET</span> /api/premium/plans/pro</button>
  </div>

  <div class="panel">
    <div class="url-bar">
      <input id="url-input" placeholder="/api/users" />
      <select id="method-select">
        <option>GET</option>
        <option>POST</option>
      </select>
      <button id="send-btn">Илгээх</button>
    </div>
    <div class="meta" id="meta">Endpoint сонгох эсвэл URL шууд оруулна уу</div>
    <pre id="output">Хариу энд харагдана...</pre>
  </div>
</div>

<script>
  const urlInput = document.getElementById('url-input');
  const methodSelect = document.getElementById('method-select');
  const output = document.getElementById('output');
  const meta = document.getElementById('meta');

  document.querySelectorAll('.ep').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ep').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      urlInput.value = btn.dataset.url;
      methodSelect.value = btn.dataset.method;
      send(btn.dataset.method, btn.dataset.url, btn.dataset.body);
    });
  });

  document.getElementById('send-btn').addEventListener('click', () => {
    send(methodSelect.value, urlInput.value);
  });

  async function send(method, url, body) {
    const start = performance.now();
    meta.innerHTML = `Илгээж байна: <strong>${method} ${url}</strong>...`;
    output.textContent = '';
    try {
      const opts = { method };
      if (body) {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = body;
      }
      const res = await fetch(url, opts);
      const text = await res.text();
      const ms = (performance.now() - start).toFixed(0);
      const statusClass = res.ok ? 'status-200' : 'status-404';
      meta.innerHTML = `<span class="${statusClass}">${res.status} ${res.statusText}</span> · ${method} ${url} · ${ms}ms`;
      try {
        output.textContent = JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        output.textContent = text;
      }
    } catch (err) {
      meta.innerHTML = `<span class="status-404">Алдаа</span>`;
      output.textContent = err.message;
    }
  }
</script>
</body>
</html>
